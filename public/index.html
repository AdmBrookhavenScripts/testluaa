<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lua → RBXMX</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f0f14;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #1a1a22;
        padding: 25px;
        border-radius: 15px;
        width: 90%;
        max-width: 400px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
        font-size: 22px;
    }

    input[type="file"] {
        width: 100%;
        padding: 10px;
        background: #2a2a35;
        border: none;
        border-radius: 8px;
        color: white;
        margin-bottom: 15px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #4f7cff;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #3a63d8;
    }

    .footer {
        margin-top: 15px;
        font-size: 12px;
        opacity: 0.7;
    }

    @media (max-width: 500px) {
        .container {
            width: 85%;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Lua → RBXMX</h1>

    <form action="/convert" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".lua" required>
        <button type="submit">Converter</button>
    </form>

    <div class="footer">
        lua2rbxmxv2.lua BY STEVE
    </div>
</div>

</body>
</html>
