<!DOCTYPE html>
<html>
<body>

<h1>Lua → RBXMX</h1>

<form
    action="/convert"
    method="post"
    enctype="multipart/form-data"
>
    <input
        type="file"
        name="file"
        accept=".lua"
        required
    >

    <button type="submit">
        Converter
    </button>
</form>

</body>
</html>
