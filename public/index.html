<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lua → RBXMX</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f5f5f5;
        color: #111;
        text-align: center;
    }

    h1 {
        font-size: 22px;
        margin-bottom: 20px;
    }

    input[type="file"] {
        width: 90%;
        max-width: 400px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fff;
        margin-bottom: 15px;
    }

    button {
        width: 90%;
        max-width: 400px;
        padding: 12px;
        background: #2d6cdf;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #1f56b8;
    }

    .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #666;
    }
</style>
</head>

<body>

<h1>Lua → RBXMX</h1>

<form action="/convert" method="post" enctype="multipart/form-data">
    <input type="file" name="file" accept=".lua" required>
    <br>
    <button type="submit">Converter</button>
</form>

<div class="footer">
    lua2rbxmxv2.lua BY STEVE
</div>

</body>
</html>
